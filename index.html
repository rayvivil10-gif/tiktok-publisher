<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Light Ray Publisher</title>
<style>
  :root{
    --black:#0A0A0A;
    --dark-gray:#1A1A1A;
    --mid-gray:#2D2D2D;
    --light-gray:#4A4A4A;
    --text:#F5F5F5;
    --text-dim:#B0B0B0;
    --accent:#E8E8E8;
  }
  body{
    background:var(--black);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    max-width:540px;margin:0 auto;padding:48px 24px;text-align:center;line-height:1.7;
  }
  h1{color:var(--accent);font-size:24px;font-weight:500;letter-spacing:1px;text-transform:uppercase;margin-bottom:32px;}
  .btn{
    display:inline-block;background:var(--accent);color:var(--black);font-weight:500;
    padding:14px 32px;border-radius:0;text-decoration:none;margin-top:20px;
    border:none;cursor:pointer;font-size:14px;letter-spacing:0.5px;transition:all 0.2s;
  }
  .btn:hover{background:var(--text);transform:scale(1.02);}
  .status{margin-top:28px;padding:16px;border-radius:0;background:var(--dark-gray);font-size:13px;border:1px solid var(--mid-gray);color:var(--text-dim);}
  input[type="file"]{margin-top:24px;color:var(--text-dim);cursor:pointer;}
  textarea{
    width:100%;margin-top:20px;background:var(--dark-gray);color:var(--text);
    border:1px solid var(--mid-gray);border-radius:0;padding:12px;
    font-family:inherit;font-size:14px;resize:vertical;line-height:1.6;
  }
  textarea:focus{outline:none;border-color:var(--light-gray);}
  #result{margin-top:20px;font-size:13px;color:var(--text-dim);word-break:break-word;min-height:20px;white-space:pre-wrap;}
  p{color:var(--text-dim);font-size:14px;margin:16px 0;}
</style>
</head>
<body>
  <h1>Light Ray Publisher</h1>
  <div class="status" id="statusBox">Vérification de la connexion...</div>

  <div id="loginZone" style="display:none;">
    <a class="btn" href="/login">Se connecter à TikTok</a>
  </div>

  <div id="uploadZone" style="display:none;">
    <p>Connecté ✅</p>

    <label style="display:block;text-align:left;font-size:13px;color:var(--text-dim);margin-top:20px;">Mode de publication</label>
    <select id="postMode" onchange="togglePrivacyBox()" style="width:100%;margin-top:6px;background:var(--dark-gray);color:var(--text);border:1px solid var(--mid-gray);padding:12px;font-size:14px;">
      <option value="draft">Brouillon (à finaliser dans l'appli TikTok)</option>
      <option value="direct">Publication directe</option>
    </select>

    <div id="directOptions" style="display:none;text-align:left;margin-top:16px;">
      <label style="display:block;font-size:13px;color:var(--text-dim);">Qui peut voir cette vidéo ?</label>
      <select id="privacyLevel" style="width:100%;margin-top:6px;background:var(--dark-gray);color:var(--text);border:1px solid var(--mid-gray);padding:12px;font-size:14px;">
        <option value="PUBLIC_TO_EVERYONE">Public</option>
        <option value="MUTUAL_FOLLOW_FRIENDS">Amis</option>
        <option value="SELF_ONLY">Privé (moi uniquement)</option>
      </select>

      <label style="display:flex;align-items:center;gap:8px;margin-top:14px;font-size:13px;color:var(--text-dim);">
        <input type="checkbox" id="brandedContent"> Cette vidéo contient du contenu de marque / promotionnel
      </label>

      <label style="display:flex;align-items:center;gap:8px;margin-top:10px;font-size:13px;color:var(--text-dim);">
        <input type="checkbox" id="consentCheck" required> Je confirme vouloir publier cette vidéo directement sur mon compte TikTok, selon les <a href="https://www.tiktok.com/legal/page/global/music-usage-confirmation/en" target="_blank" style="color:var(--text);">règles d'utilisation musicale</a> de TikTok.
      </label>
    </div>

    <textarea id="videoCaption" placeholder="Écris ta légende ici... (titre, description, hashtags)" rows="4"></textarea>
    <input type="file" id="videoFile" accept="video/mp4">
    <br>
    <button class="btn" onclick="uploadVideo()">Envoyer la vidéo</button>
    <div id="result"></div>
  </div>

  <script>
    function togglePrivacyBox() {
      const mode = document.getElementById('postMode').value;
      document.getElementById('directOptions').style.display = mode === 'direct' ? 'block' : 'none';
    }
  </script>

  <script>
    async function checkStatus() {
      const res = await fetch('/status');
      const data = await res.json();
      document.getElementById('statusBox').textContent = data.connected
        ? 'Connecté à TikTok (ID: ' + data.open_id + ')'
        : 'Non connecté à TikTok';
      document.getElementById('loginZone').style.display = data.connected ? 'none' : 'block';
      document.getElementById('uploadZone').style.display = data.connected ? 'block' : 'none';
    }

    async function uploadVideo() {
      const file = document.getElementById('videoFile').files[0];
      const caption = document.getElementById('videoCaption').value;
      const mode = document.getElementById('postMode').value;

      if (!file) return alert('Choisis une vidéo d\'abord.');

      if (mode === 'direct' && !document.getElementById('consentCheck').checked) {
        return alert('Merci de cocher la case de confirmation avant de publier directement.');
      }

      const formData = new FormData();
      formData.append('video', file);
      formData.append('caption', caption);
      formData.append('mode', mode);
      if (mode === 'direct') {
        formData.append('privacy_level', document.getElementById('privacyLevel').value);
        formData.append('branded_content', document.getElementById('brandedContent').checked);
      }

      document.getElementById('result').textContent = 'Envoi en cours...';
      const res = await fetch('/upload', { method: 'POST', body: formData });
      const data = await res.json();

      if (!data.success) {
        document.getElementById('result').textContent = '❌ Erreur : ' + JSON.stringify(data.error);
      } else if (mode === 'direct') {
        document.getElementById('result').textContent = '✅ Vidéo publiée directement sur TikTok !';
      } else {
        document.getElementById('result').textContent = '✅ Vidéo envoyée ! Va dans l\'appli TikTok → Brouillons.\n\n🏷️ Légende à coller :\n' + caption;
      }
    }

    checkStatus();
  </script>
</body>
</html>
